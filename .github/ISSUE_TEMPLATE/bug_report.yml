name: Bug report
description: Something broke. Help us reproduce it.
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug. The faster we can reproduce, the faster we ship a fix.

        For security vulnerabilities, please use [SECURITY.md](../../SECURITY.md) instead -- do not file a public issue.

  - type: input
    id: sdk-version
    attributes:
      label: Package version
      description: Output of `pip show tessera-pydantic-ai`.
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: input
    id: framework-version
    attributes:
      label: Pydantic AI version
      description: Output of `pip show pydantic-ai`.
      placeholder: e.g. 0.5.x
    validations:
      required: true

  - type: input
    id: runtime
    attributes:
      label: Runtime version
      description: `node --version` or `python --version`.
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimum reproduction
      description: Smallest snippet that triggers the bug.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include stack traces, HTTP responses, or proxy headers if relevant.
    validations:
      required: true